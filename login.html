<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access | Skill-Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-hover: #4f46e5;
            --bg: #0f172a; 
            --glass: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.1); 
            --nav-bg: rgba(15, 23, 42, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            padding-top: 70px;
        }

        /* Navbar links styling */
nav a {
    color: #94a3b8;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.3s ease;
    position: relative;
}

/* Hover effect */
nav a:hover {
    color: #ffffff;
}

/* Spacing between navbar items */
.nav-menu a {
    margin: 0 12px;
}

/* Underline animation (modern effect) */
nav a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: -5px;
    left: 0;
    background: linear-gradient(to right, #818cf8, #c084fc);
    transition: width 0.3s ease;
}

nav a:hover::after {
    width: 100%;
}

/* Active click effect */
nav a:active {
    color: #c084fc;
}
        /* --- Navbar Styles --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 1000;
        }

        .nav-logo {
            font-weight: 700;
            font-size: 1.25rem;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

              .nav-menu {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .btn-login {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-login:hover {
            color: var(--primary);
        }

        /* General Button Style */
        .btn {
            background: var(--primary);
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }


        /* --- Auth Card Styles --- */
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin: 2rem 0;
        }

        .logo-area { margin-bottom: 1.5rem; }
        .logo-area h1 { font-size: 1.8rem; font-weight: 700; color: var(--primary); }

        .input-group { position: relative; margin-bottom: 1.2rem; text-align: left; }
        .input-group i { position: absolute; left: 1rem; top: 2.6rem; color: #64748b; }

        label { display: block; margin-bottom: 0.4rem; font-size: 0.8rem; color: #94a3b8; }
        
        input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            padding: 0.7rem 1rem 0.7rem 2.8rem;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }

        .btn-auth {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }

        .btn-auth:hover { background: var(--primary-hover); transform: translateY(-1px); }

        .footer-links { margin-top: 1.5rem; font-size: 0.85rem; color: #94a3b8; }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; }

        /* Toggle logic */
        #register-form { display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="nav-logo">
            <i data-lucide="layers"></i> Skill-Sync
        </a>
        <a href="{{ url_for('index') }}">Home</a>
  <a href="{{ url_for('dashboard') }}">Dashboard</a>
  <a href="{{ url_for('chat') }}">Chat</a>
  <a href="{{ url_for('experience') }}">Experience</a>
  <a href="{{ url_for('feedback') }}">Feedback</a>
  <a href="{{ url_for('final_portfolio') }}">Portfolio</a>
    </nav>

    <div class="auth-card">
        <div class="logo-area">
            <i data-lucide="shield-check" style="color: var(--primary); width: 40px; height: 40px; margin-bottom: 0.5rem;"></i>
            <h1 id="auth-title">Welcome Back</h1>
            <p id="auth-subtitle" style="color: #94a3b8; font-size: 0.9rem;">Sign in to continue your journey</p>
        </div>

        <form id="login-form" method="POST" action="/login">

    <div class="input-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="name@email.com" required>
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn-auth">Sign In</button>

    <div class="footer-links">
        Don't have an account? <a onclick="toggleAuth()">Create one</a>
    </div>

</form>

       <form id="register-form" method="POST" action="/register">

        <div class="input-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="John Doe" required>
        </div>

        <div class="input-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="name@email.com" required>
        </div>

        <div class="input-group">
        <label>Create Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-auth">Join Skill-Sync</button>

        </form>
    </div>

    <script>
        lucide.createIcons();

        function toggleAuth() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');

            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                title.innerText = 'Welcome Back';
                subtitle.innerText = 'Sign in to continue your journey';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                title.innerText = 'Create Account';
                subtitle.innerText = 'Join the peer-to-peer learning revolution';
            }
        }
    </script>
</body>
</html>
